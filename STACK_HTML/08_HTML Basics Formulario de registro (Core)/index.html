<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro</title>
</head>

<body>
    <h1>Crear una cuenta en Discord</h1>

    <form action="registro" method="post">
        <div>
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" placeholder="ej: Tomás">
        </div><br>

        <div>
            <label for="apellido">Apellido:</label>
            <input type="text" id="apellido" name="apellido" placeholder="ej: Santana">
        </div><br>
        <div>
            <label for="correo">Correo electrónico:</label>
            <input type="text" id="correo" name="correo" placeholder="Ingresa tu correo">
        </div><br>
        <div>
            <label for="contraseña">Contraseña:</label>
            <input type="password" id="contraseña" name="contraseña" placeholder="Ingresa tu contraseña" />
        </div><br>
        <div>
            <label for="confirmar_contraseña">Confirmar contraseña:</label>
            <input type="password" id="confirmar_contraseña" name="confirmar_contraseña"
                placeholder="Confirma tu contraseña" />
        </div><br>
        <div>
            <label for="fecha_nacimiento">Fecha de nacimiento:</label>
            <input type="date" id="fecha_nacimiento" name="fecha_nacimiento">
        </div><br>
        <div>
            <label>Género:</label>
            <input type="radio" id="masculino" name="genero" value="masculino">
            <label for="masculino">Masculino</label>
            <input type="radio" id="femenino" name="genero" value="femenino">
            <label for="femenino">Femenino</label>
            <input type="radio" id="otro" name="genero" value="otro">
            <label for="otro">Prefiero no decirlo</label>
        </div><br>
        <div>
            <label for="comentario">Descripción sobre ti:</label><br>
            <textarea id="comentario" name="comentario" rows="4" cols="30"></textarea>
        </div><br>
        <div>
            <label for="intereses">Selecciona tus intereses:</label><br>
            <select id="intereses" name="intereses">
                <option value="musica">Música</option>
                <option value="peliculas">Películas</option>
                <option value="deportes">Deportes</option>
                <option value="tecnologia">Tecnología</option>
                <option value="arte">Arte</option>
            </select>
        </div><br>
        <div>
            <input type="checkbox" id="acepto" name="acepto">
            <label for="acepto">Al registrarte, aceptas los <a href="https://discord.com/terms">Términos y
                    condiciones</a> de Discord
            </label>
        </div><br>
        <div>
            <input type="submit" value="Registrarse">
        </div>
    </form>
</body>

</html>
